services:
  ordersmicroservice.api:
    image: ordersmicroserviceapi
    build:
      context: .
      dockerfile: OrdersMicroservice.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - MONGODB_HOST=mongodb-container
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=OrdersDatabase
      - UsersMicroserviceName=api-gateway
      - UsersMicroservicePort=8080
      - ProductsMicroserviceName=api-gateway
      - ProductsMicroservicePort=8080
      - REDIS_HOST=redis-container
      - REDIS_PORT=6379  
      - RABBITMQ_HOST=rabbitmq-container
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=admin
      - RABBITMQ_PORT=5672
      - RABBITMQ_PRODUCTS_EXCHANGE=products.exchange
    ports:
      - "7000:8080"
    networks:
      - orders-mongodb-network
      - ecommerce-network
    depends_on:
      - mongodb-container
      - rabbitmq-container

  mongodb-container:
    image: mongo:latest
    ports:
        - "27017:27017"
    volumes:
        - ../mongo-init:/docker-entrypoint-initdb.d
    networks:
        - orders-mongodb-network
  
  products-microservice:
    image: products-microservice:latest
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_HTTP_PORTS=8080
        - MYSQL_HOST=mysql-container
        - MYSQL_PASSWORD=wael
        - MYSQL_PORT=3306
        - MYSQL_DATABASE=ProductsDb
        - MYSQL_USER=wael
        - RABBITMQ_HOST=rabbitmq-container
        - RABBITMQ_USERNAME=admin
        - RABBITMQ_PASSWORD=admin
        - RABBITMQ_PORT=5672
        - RABBITMQ_PRODUCTS_EXCHANGE=products.exchange
    ports:
        - "6000:8080"
    networks:
        - products-mysql-network
        - ecommerce-network
    depends_on:
        - mysql-container
        - rabbitmq-container 

  mysql-container:
    image: mysql:latest
    environment:
        - MYSQL_ROOT_PASSWORD=wael
        - MYSQL_DATABASE=ProductsDb
        - MYSQL_USER=wael
        - MYSQL_PASSWORD=wael
    ports:
        - "3307:3306"
    volumes:
        - ../mysql-init:/docker-entrypoint-initdb.d
    networks:
        - products-mysql-network

  users-microservice:
    image: users-microservice:latest
    environment:
        - ASPNETCORE_ENVIRONMENT=Development
        - ASPNETCORE_HTTP_PORTS=8080
        - POSTGRES_HOST=postgres-container
        - POSTGRES_PORT=5432
        - POSTGRES_DATABASE=eCommerceUsers
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=wael  
    ports:
        - "5000:8080"
    networks:
        - users-postgres-network
        - ecommerce-network
    depends_on:
        - postgres-container

  postgres-container:
    image: postgres:latest
    environment:
        - POSTGRES_USER=postgres
        - POSTGRES_PASSWORD=wael
        - POSTGRES_DB=eCommerceUsers
    ports:
        - "5433:5432"
    volumes:
        - ../postgres-init:/docker-entrypoint-initdb.d
    networks:
      - users-postgres-network

  redis-container:
    image: redis:latest
    ports:
        - "6379:6379"
    networks:
        - ecommerce-network
  
  api-gateway:
    image: api-gateway
    build:
        context: .
        dockerfile: ApiGateway/Dockerfile
    ports:
        - "4000:8080"
    networks:
        - ecommerce-network

  rabbitmq-container:
    image: rabbitmq:3.13-management
    ports:
        - "5672:5672"
        - "15672:15672"
    environment:
        - RABBITMQ_DEFAULT_USER=admin
        - RABBITMQ_DEFAULT_PASS=admin
    networks:
        - ecommerce-network

networks:
   orders-mongodb-network:
     driver: bridge  
   products-mysql-network:
     driver: bridge
   users-postgres-network:
     driver: bridge
   ecommerce-network:
     driver: bridge 
